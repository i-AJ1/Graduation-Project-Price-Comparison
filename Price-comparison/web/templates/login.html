{% extends "layout.html" %}

{% block title %}تسجيل الدخول - مقارنة الأسعار{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle text-primary" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold mt-2">تسجيل الدخول</h2>
                        <p class="text-muted">مرحباً بك مجدداً في موقعنا</p>
                    </div>

                    <form action="{{ url_for('login') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">اسم المستخدم</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control bg-light border-0" id="username" name="username" required placeholder="أدخل اسم المستخدم">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">كلمة المرور</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control bg-light border-0" id="password" name="password" required placeholder="********">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                            دخول <i class="bi bi-box-arrow-in-right ms-2"></i>
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">ليس لديك حساب؟ 
                            <a href="{{ url_for('register') }}" class="text-primary text-decoration-none fw-bold">سجل الآن</a>
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('home') }}" class="text-secondary text-decoration-none small">
                    <i class="bi bi-arrow-right"></i> العودة للرئيسية
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
