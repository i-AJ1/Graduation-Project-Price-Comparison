{% extends "layout.html" %}

{% block title %}إنشاء حساب جديد - مقارنة الأسعار{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 75vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill text-primary" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold mt-2">إنشاء حساب</h2>
                        <p class="text-muted">انضم إلينا للحصول على أفضل العروض</p>
                    </div>

                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold small">اسم المستخدم</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control bg-light border-0" id="username" name="username" required placeholder="مثال: ahmed_123">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold small">البريد الإلكتروني</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-light border-0" id="email" name="email" required placeholder="name@example.com">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold small">كلمة المرور</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control bg-light border-0" id="password" name="password" required placeholder="********">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                            إنشاء الحساب <i class="bi bi-check-circle ms-2"></i>
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">لديك حساب بالفعل؟ 
                            <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">سجل دخولك</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
